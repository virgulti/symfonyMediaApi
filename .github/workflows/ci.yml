name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: media_api_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, intl

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists
        env:
          JWT_PASSPHRASE: test-passphrase

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction
        env:
          DATABASE_URL: "postgresql://app:secret@127.0.0.1:5432/media_api_test"

      - name: Run tests
        run: php bin/phpunit
        env:
          DATABASE_URL: "postgresql://app:secret@127.0.0.1:5432/media_api_test"
