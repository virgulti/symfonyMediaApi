name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Dev and tests run on SQLite (the committed migrations are SQLite-targeted),
    # so no database service is needed. PostgreSQL is the production-like target
    # documented in docker-compose.yml.
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_sqlite, sqlite3, openssl, ctype, iconv, mbstring
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate JWT keypair
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Create test database schema
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run test suite
        run: php bin/phpunit
