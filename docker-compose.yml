# PostgreSQL services for a production-like environment.
#
# Local development and the test suite use SQLite (zero-config, see .env / .env.test),
# so Docker is optional. Bring these up if you want to run the app against PostgreSQL:
#
#   docker compose up -d postgres
#   DATABASE_URL="postgresql://app:secret@127.0.0.1:5432/media_api?serverVersion=16&charset=utf8" \
#     php bin/console doctrine:migrations:diff   # regenerate migrations for PostgreSQL
#
# Note: the committed migrations target SQLite; regenerate them against PostgreSQL before migrating.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: media_api
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "media_api", "-U", "app"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: media_api_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"

volumes:
  postgres_data:
